      YOUTUBE_CATEGORY_ID: ${{ secrets.YOUTUBE_CATEGORY_ID || '24' }}
      YOUTUBE_TAGS_ENABLED: ${{ vars.YOUTUBE_TAGS_ENABLED || secrets.YOUTUBE_TAGS_ENABLED || 'false' }}
      YOUTUBE_TAGS: ${{ vars.YOUTUBE_TAGS || secrets.YOUTUBE_TAGS || '' }}
