      CLIPPER_ROOT: clipper
      CLIPPER_TIMEOUT_SECONDS: ${{ secrets.CLIPPER_TIMEOUT_SECONDS || '4200' }}
      CLIPPER_IDLE_TIMEOUT_SECONDS: ${{ secrets.CLIPPER_IDLE_TIMEOUT_SECONDS || '1200' }}
