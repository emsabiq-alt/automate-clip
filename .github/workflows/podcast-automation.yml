name: Podcast Clipper Automation

on:
  workflow_dispatch:
    inputs:
      theme:
        description: Theme to process
        required: false
        default: auto
      url:
        description: Optional YouTube URL for manual run
        required: false
        default: ""
      range:
        description: Optional manual range, example 00:01:20-00:02:05
        required: false
        default: ""
      force_reprocess:
        description: "Force manual URL duplicate: true/false. Use scheduled to test queue-series now."
        required: false
        default: "false"
      quality_profile:
        description: "Video quality profile: fast, standard, high, ultra"
        required: false
        default: standard
      deepgram_enabled:
        description: "Deepgram transcription is required: use 1"
        required: false
        default: "1"
      subtitle_font:
        description: Subtitle font family
        required: false
        default: "Selawik Semibold"
      subtitle_font_size:
        description: Subtitle font size
        required: false
        default: "56"
      subtitle_margin_v:
        description: Subtitle bottom margin
        required: false
        default: "550"
      subtitle_margin_h:
        description: Subtitle side margin
        required: false
        default: "80"
      scene_mode:
        description: "Scene mode: podcast, solo, game, reaction, sport, auto, active_speaker, center"
        required: false
        default: "auto"
      clip_count:
        description: How many clips to render from the source video
        required: false
        default: "1"
      use_frame:
        description: "Apply PodFlask frame: true/false"
        required: false
        default: "true"
      use_filter:
        description: "Apply light uniqueness filter: true/false"
        required: false
        default: "true"
      use_watermark:
        description: "Apply transparent logo watermark: true/false"
        required: false
        default: "false"
      background_music_enabled:
        description: "Mix local backsound: 0/1"
        required: false
        default: "1"
      background_music_file:
        description: "Path backsound, use auto for theme mapping"
        required: false
        default: "auto"
      background_music_map_file:
        description: "Backsound mapping JSON"
        required: false
        default: "assets/music/music-map.json"
      background_music_volume:
        description: "Backsound volume, example 0.06"
        required: false
        default: "0.06"
      subtitle_highlight_enabled:
        description: "Subtitle word highlight: true/false"
        required: false
        default: "true"
      subtitle_emoji_popup_enabled:
        description: "Emoji popup subtitle: true/false"
        required: false
        default: "true"
      ai_provider:
        description: "AI teks dikunci ke OpenAI; input lama diabaikan"
        required: false
        default: "openai"
      safe_publish_mode:
        description: "Safe publish mode: all, youtube_only, social_only, none"
        required: false
        default: "all"
      publish_ready_only:
        description: "Publish an existing ready_to_publish job without generating a new clip: true/false"
        required: false
        default: "false"
      publish_ready_job_id:
        description: "Optional ready job id to publish; empty uses latest ready job"
        required: false
        default: ""
  schedule:
    # GitHub schedule uses UTC (WIB = UTC+7).
    # Target 7 scheduled runs per hari. Tiap run series mengambil 1 source dan
    # merender 1 klip (QUEUE_SERIES_TARGET_COUNT=1) -> 1 link = 1 video.
    # 7 run = 7 video/hari; MAX_SCHEDULED_POSTS_PER_DAY=7 menjaga cap tetap 7.
    # Jam dipilih di waktu santai / orang buka HP; menit off-peak (bukan :00/:30)
    # agar delay antrian cron GitHub minimal.
    - cron: "47 23 * * *"  # 06:47 WIB - bangun pagi / commute
    - cron: "47 2 * * *"   # 09:47 WIB - mid-morning break
    - cron: "17 5 * * *"   # 12:17 WIB - makan siang
    - cron: "17 8 * * *"   # 15:17 WIB - break sore
    - cron: "47 11 * * *"  # 18:47 WIB - pulang kerja
    - cron: "47 13 * * *"  # 20:47 WIB - prime time malam
    - cron: "17 15 * * *"  # 22:17 WIB - scroll sebelum tidur

concurrency:
  group: podcast-clipper-automation
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    env:
      LOCAL_PORT: 8788
      APP_TIMEZONE: Asia/Jakarta
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_PREFER_OFFLINE: "true"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_PREFER_BINARY: "1"

      PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
      UPLOAD_DRIVER: sftp
      REMOTE_UPLOAD_REQUIRED: ${{ secrets.REMOTE_UPLOAD_REQUIRED || 'false' }}
      DRY_RUN: "false"
      AUTO_PUBLISH: "true"
      SAFE_PUBLISH_MODE: ${{ github.event.inputs.safe_publish_mode || vars.SAFE_PUBLISH_MODE || secrets.SAFE_PUBLISH_MODE || 'all' }}
      DEFAULT_THEME: auto

      GRAPH_API_VERSION: v25.0
      API_CHECK_TIMEOUT_SECONDS: ${{ secrets.API_CHECK_TIMEOUT_SECONDS || '90' }}

      INSTAGRAM_UPLOAD_ENABLED: ${{ secrets.INSTAGRAM_UPLOAD_ENABLED || 'true' }}
      INSTAGRAM_REEL_UPLOAD_METHOD: video_url
      INSTAGRAM_MAX_UPLOAD_BYTES: ${{ secrets.INSTAGRAM_MAX_UPLOAD_BYTES || '7800000' }}
      FACEBOOK_UPLOAD_ENABLED: ${{ secrets.FACEBOOK_UPLOAD_ENABLED || 'true' }}
      FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
      FACEBOOK_USER_ACCESS_TOKEN: ${{ secrets.FACEBOOK_USER_ACCESS_TOKEN }}
      AUTO_REFRESH_FACEBOOK_TOKEN: ${{ secrets.AUTO_REFRESH_FACEBOOK_TOKEN || 'true' }}
      FACEBOOK_MEDIA_TYPE: ${{ secrets.FACEBOOK_MEDIA_TYPE || 'reel' }}
      FACEBOOK_VIDEO_STATE: ${{ secrets.FACEBOOK_VIDEO_STATE || 'PUBLISHED' }}
      FACEBOOK_TITLE_PREFIX: ${{ secrets.FACEBOOK_TITLE_PREFIX }}

      YOUTUBE_UPLOAD_ENABLED: ${{ secrets.YOUTUBE_UPLOAD_ENABLED || 'true' }}
      YOUTUBE_QUOTA_COOLDOWN_ENABLED: ${{ secrets.YOUTUBE_QUOTA_COOLDOWN_ENABLED || 'true' }}
      YOUTUBE_UPLOAD_QUOTA_COOLDOWN_ENABLED: ${{ secrets.YOUTUBE_UPLOAD_QUOTA_COOLDOWN_ENABLED || 'true' }}
      YOUTUBE_DATA_API_QUOTA_COOLDOWN_ENABLED: ${{ secrets.YOUTUBE_DATA_API_QUOTA_COOLDOWN_ENABLED || 'true' }}
      YOUTUBE_QUOTA_RESET_BUFFER_MINUTES: ${{ secrets.YOUTUBE_QUOTA_RESET_BUFFER_MINUTES || '30' }}

      TIKTOK_UPLOAD_PAUSED: ${{ secrets.TIKTOK_UPLOAD_PAUSED || 'false' }}
      TIKTOK_UPLOAD_ENABLED: ${{ secrets.TIKTOK_UPLOAD_ENABLED || 'true' }}
      TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
      TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
      TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
      TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
      TIKTOK_OPEN_ID: ${{ secrets.TIKTOK_OPEN_ID }}
      TIKTOK_SCOPE: ${{ secrets.TIKTOK_SCOPE }}
      TIKTOK_REDIRECT_URI: ${{ secrets.TIKTOK_REDIRECT_URI || 'https://clipper.emsa.pro/ig-generated/auth/tiktok/callback.php' }}
      TIKTOK_PUBLISH_MODE: ${{ secrets.TIKTOK_PUBLISH_MODE || 'direct' }}
      TIKTOK_PRIVACY_LEVEL: ${{ secrets.TIKTOK_PRIVACY_LEVEL || 'PUBLIC_TO_EVERYONE' }}
      TIKTOK_DISABLE_DUET: ${{ secrets.TIKTOK_DISABLE_DUET || 'false' }}
      TIKTOK_DISABLE_COMMENT: ${{ secrets.TIKTOK_DISABLE_COMMENT || 'false' }}
      TIKTOK_DISABLE_STITCH: ${{ secrets.TIKTOK_DISABLE_STITCH || 'false' }}
      TIKTOK_COVER_TIMESTAMP_MS: ${{ secrets.TIKTOK_COVER_TIMESTAMP_MS || '1000' }}

      THREADS_UPLOAD_ENABLED: ${{ secrets.THREADS_UPLOAD_ENABLED || 'false' }}
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
      THREADS_API_VERSION: ${{ secrets.THREADS_API_VERSION || 'v1.0' }}
      AUTO_REFRESH_THREADS_TOKEN: ${{ secrets.AUTO_REFRESH_THREADS_TOKEN || 'true' }}
      THREADS_TOKEN_ISSUED_AT: ${{ secrets.THREADS_TOKEN_ISSUED_AT }}
      THREADS_APP_SECRET: ${{ secrets.THREADS_APP_SECRET }}
      THREADS_CONTAINER_POLL_SECONDS: ${{ secrets.THREADS_CONTAINER_POLL_SECONDS || '6' }}
      THREADS_CONTAINER_MAX_ATTEMPTS: ${{ secrets.THREADS_CONTAINER_MAX_ATTEMPTS || '90' }}
      META_INTER_CLIP_DELAY_SECONDS: ${{ vars.META_INTER_CLIP_DELAY_SECONDS || secrets.META_INTER_CLIP_DELAY_SECONDS || '75' }}

      SFTP_HOST: ${{ secrets.SFTP_HOST || secrets.FTP_HOST }}
      SFTP_PORT: ${{ secrets.SFTP_PORT || '65002' }}
      SFTP_USER: ${{ secrets.SFTP_USER }}
      SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD || secrets.FTP_PASSWORD }}
      SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
      SFTP_PASSPHRASE: ${{ secrets.SFTP_PASSPHRASE }}
      SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
      SFTP_TIMEOUT_SECONDS: ${{ vars.SFTP_TIMEOUT_SECONDS || secrets.SFTP_TIMEOUT_SECONDS || secrets.FTP_TIMEOUT_SECONDS || '120' }}
      SFTP_UPLOAD_TIMEOUT_SECONDS: ${{ secrets.SFTP_UPLOAD_TIMEOUT_SECONDS || secrets.FTP_UPLOAD_TIMEOUT_SECONDS || '1800' }}
      SFTP_CLEANUP_TIMEOUT_SECONDS: ${{ secrets.SFTP_CLEANUP_TIMEOUT_SECONDS || secrets.FTP_CLEANUP_TIMEOUT_SECONDS || '600' }}
      SFTP_STATE_TIMEOUT_SECONDS: ${{ vars.SFTP_STATE_TIMEOUT_SECONDS || secrets.SFTP_STATE_TIMEOUT_SECONDS || secrets.FTP_STATE_TIMEOUT_SECONDS || '120' }}
      SFTP_PRECHECK_TIMEOUT_SECONDS: ${{ vars.SFTP_PRECHECK_TIMEOUT_SECONDS || secrets.SFTP_PRECHECK_TIMEOUT_SECONDS || secrets.FTP_PRECHECK_TIMEOUT_SECONDS || '30' }}
      SFTP_PRECHECK_RETRIES: ${{ vars.SFTP_PRECHECK_RETRIES || secrets.SFTP_PRECHECK_RETRIES || secrets.FTP_PRECHECK_RETRIES || '3' }}
      SFTP_UPLOAD_RETRIES: ${{ secrets.SFTP_UPLOAD_RETRIES || secrets.FTP_UPLOAD_RETRIES || '4' }}
      SFTP_PUBLIC_URL_RETRIES: ${{ secrets.SFTP_PUBLIC_URL_RETRIES || secrets.FTP_PUBLIC_URL_RETRIES || '8' }}
      SFTP_PUBLIC_URL_RETRY_DELAY_MS: ${{ secrets.SFTP_PUBLIC_URL_RETRY_DELAY_MS || secrets.FTP_PUBLIC_URL_RETRY_DELAY_MS || '2500' }}

      AI_PROVIDER: openai
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4.1-nano' }}
      OPENAI_MODELS: ${{ secrets.OPENAI_MODELS || 'gpt-4.1-nano,gpt-5-nano,gpt-4o-mini' }}
      OPENAI_TEMPERATURE: ${{ secrets.OPENAI_TEMPERATURE || '0.45' }}
      OPENAI_TRANSCRIBE_MODEL: ${{ secrets.OPENAI_TRANSCRIBE_MODEL || 'gpt-4o-mini-transcribe' }}
      AI_REQUEST_TIMEOUT_SECONDS: ${{ secrets.AI_REQUEST_TIMEOUT_SECONDS || '25' }}
      TRANSCRIBE_PROVIDER: ${{ secrets.TRANSCRIBE_PROVIDER || 'deepgram' }}
      MAX_SCHEDULED_POSTS_PER_DAY: ${{ vars.MAX_SCHEDULED_POSTS_PER_DAY || secrets.MAX_SCHEDULED_POSTS_PER_DAY || '7' }}
      AUTOMATION_QUEUE_LINK_LIMIT: ${{ vars.AUTOMATION_QUEUE_LINK_LIMIT || secrets.AUTOMATION_QUEUE_LINK_LIMIT || '10' }}
      QUEUE_SERIES_TARGET_COUNT: ${{ vars.QUEUE_SERIES_TARGET_COUNT || secrets.QUEUE_SERIES_TARGET_COUNT || '1' }}
      SCHEDULED_CLIPS_PER_RUN: ${{ vars.SCHEDULED_CLIPS_PER_RUN || secrets.SCHEDULED_CLIPS_PER_RUN || '1' }}
      DEEPGRAM_ENABLED: ${{ github.event.inputs.deepgram_enabled || '1' }}
      DEEPGRAM_API_KEYS: ${{ secrets.DEEPGRAM_API_KEYS }}
      DEEPGRAM_MODEL: ${{ secrets.DEEPGRAM_MODEL || 'nova-3' }}
      DEEPGRAM_LANGUAGE: id
      DEEPGRAM_TIMEOUT_SECONDS: ${{ secrets.DEEPGRAM_TIMEOUT_SECONDS || '900' }}
      DEEPGRAM_AUDIO_BITRATE: ${{ secrets.DEEPGRAM_AUDIO_BITRATE || '32k' }}
      DEEPGRAM_AUDIO_SAMPLE_RATE: ${{ secrets.DEEPGRAM_AUDIO_SAMPLE_RATE || '16000' }}

      INSTAGRAM_IG_USER_ID: ${{ secrets.INSTAGRAM_IG_USER_ID }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      META_APP_ID: ${{ secrets.META_APP_ID }}
      META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
      AUTO_REFRESH_INSTAGRAM_TOKEN: ${{ secrets.AUTO_REFRESH_INSTAGRAM_TOKEN || 'true' }}
      INSTAGRAM_CONTAINER_POLL_SECONDS: ${{ secrets.INSTAGRAM_CONTAINER_POLL_SECONDS || '6' }}
      INSTAGRAM_CONTAINER_MAX_ATTEMPTS: ${{ secrets.INSTAGRAM_CONTAINER_MAX_ATTEMPTS || '90' }}
      TOKEN_REFRESH_BEFORE_DAYS: ${{ secrets.TOKEN_REFRESH_BEFORE_DAYS || '10' }}
      AUTO_DISCOVER_VIDEOS: ${{ secrets.AUTO_DISCOVER_VIDEOS || 'true' }}
      AUTO_DISCOVER_QUERY: ${{ secrets.AUTO_DISCOVER_QUERY || 'motivasi hidup bahasa indonesia|ceramah motivasi indonesia|motivasi sukses bahasa indonesia|motivasi pagi bahasa indonesia|motivator indonesia terbaru|motivasi pantang menyerah indonesia|nasihat kehidupan indonesia|motivasi bangkit dari kegagalan|motivasi kerja keras indonesia|renungan kehidupan indonesia' }}
      AUTO_DISCOVER_DAILY_QUERY: ${{ secrets.AUTO_DISCOVER_DAILY_QUERY || 'motivasi hidup indonesia hari ini' }}
      AUTO_DISCOVER_USE_API: ${{ secrets.AUTO_DISCOVER_USE_API || 'false' }}
      AUTO_DISCOVER_CHANNEL_ONLY: ${{ vars.AUTO_DISCOVER_CHANNEL_ONLY || secrets.AUTO_DISCOVER_CHANNEL_ONLY || 'false' }}
      AUTO_DISCOVER_ALLOW_OAUTH: ${{ secrets.AUTO_DISCOVER_ALLOW_OAUTH || 'false' }}
      AUTO_DISCOVER_DAILY_SEARCH_ONLY: ${{ secrets.AUTO_DISCOVER_DAILY_SEARCH_ONLY || 'true' }}
      AUTO_DISCOVER_DAILY_SEARCH_RESULTS: ${{ secrets.AUTO_DISCOVER_DAILY_SEARCH_RESULTS || '10' }}
      AUTO_DISCOVER_TRENDING_ENABLED: ${{ secrets.AUTO_DISCOVER_TRENDING_ENABLED || 'false' }}
      AUTO_DISCOVER_TRENDING_CATEGORY_IDS: ${{ secrets.AUTO_DISCOVER_TRENDING_CATEGORY_IDS || '24,22,10' }}
      AUTO_DISCOVER_TRENDING_MAX_RESULTS: ${{ secrets.AUTO_DISCOVER_TRENDING_MAX_RESULTS || '5' }}
      AUTO_DISCOVER_TRENDING_MAX_AGE_HOURS: ${{ secrets.AUTO_DISCOVER_TRENDING_MAX_AGE_HOURS || '36' }}
      AUTO_DISCOVER_CACHE_SYNC_IMMEDIATE: ${{ secrets.AUTO_DISCOVER_CACHE_SYNC_IMMEDIATE || 'true' }}
      AUTO_DISCOVER_VALIDATE_URL: ${{ secrets.AUTO_DISCOVER_VALIDATE_URL || 'true' }}
      AUTO_DISCOVER_MAX_RESULTS: ${{ vars.AUTO_DISCOVER_MAX_RESULTS || secrets.AUTO_DISCOVER_MAX_RESULTS || '10' }}
      AUTO_DISCOVER_ADD_COUNT: ${{ vars.AUTO_DISCOVER_ADD_COUNT || secrets.AUTO_DISCOVER_ADD_COUNT || '10' }}
      AUTO_DISCOVER_DAILY_QUEUE_LIMIT: ${{ vars.AUTO_DISCOVER_DAILY_QUEUE_LIMIT || secrets.AUTO_DISCOVER_DAILY_QUEUE_LIMIT || '10' }}
      AUTO_DISCOVER_EXPIRE_OLD_QUEUE: ${{ secrets.AUTO_DISCOVER_EXPIRE_OLD_QUEUE || 'true' }}
      AUTO_DISCOVER_QUEUE_TTL_DAYS: ${{ secrets.AUTO_DISCOVER_QUEUE_TTL_DAYS || '1' }}
      AUTO_DISCOVER_MIN_DURATION_SECONDS: ${{ secrets.AUTO_DISCOVER_MIN_DURATION_SECONDS || '180' }}
      AUTO_DISCOVER_MAX_DURATION_SECONDS: ${{ secrets.AUTO_DISCOVER_MAX_DURATION_SECONDS || '1800' }}
      AUTO_DISCOVER_MIN_VIEWS: ${{ vars.AUTO_DISCOVER_MIN_VIEWS || secrets.AUTO_DISCOVER_MIN_VIEWS || '0' }}
      AUTO_DISCOVER_MIN_VIEWS_PER_HOUR: ${{ vars.AUTO_DISCOVER_MIN_VIEWS_PER_HOUR || secrets.AUTO_DISCOVER_MIN_VIEWS_PER_HOUR || '0' }}
      AUTO_DISCOVER_PUBLISHED_AFTER_DAYS: ${{ vars.AUTO_DISCOVER_PUBLISHED_AFTER_DAYS || secrets.AUTO_DISCOVER_PUBLISHED_AFTER_DAYS || '30' }}
      AUTO_DISCOVER_FALLBACK_MAX_RESULTS: ${{ vars.AUTO_DISCOVER_FALLBACK_MAX_RESULTS || secrets.AUTO_DISCOVER_FALLBACK_MAX_RESULTS || '10' }}
      AUTO_DISCOVER_REGION_CODE: ${{ secrets.AUTO_DISCOVER_REGION_CODE || 'ID' }}
      AUTO_DISCOVER_RELEVANCE_LANGUAGE: ${{ secrets.AUTO_DISCOVER_RELEVANCE_LANGUAGE || 'id' }}
      AUTO_DISCOVER_BLOCKED_CHANNELS: ${{ vars.AUTO_DISCOVER_BLOCKED_CHANNELS || secrets.AUTO_DISCOVER_BLOCKED_CHANNELS || 'Taulany TV|@taulanytv' }}
      AUTO_DISCOVER_CHANNEL_IDS: ${{ secrets.AUTO_DISCOVER_CHANNEL_IDS }}
      AUTO_DISCOVER_CHANNEL_HANDLES: ${{ secrets.AUTO_DISCOVER_CHANNEL_HANDLES || '' }}
      AUTO_DISCOVER_FRESH_UPLOAD_DAYS: ${{ vars.AUTO_DISCOVER_FRESH_UPLOAD_DAYS || secrets.AUTO_DISCOVER_FRESH_UPLOAD_DAYS || '30' }}
      AUTO_DISCOVER_CHANNEL_MAX_RESULTS: ${{ vars.AUTO_DISCOVER_CHANNEL_MAX_RESULTS || secrets.AUTO_DISCOVER_CHANNEL_MAX_RESULTS || '10' }}

      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY || secrets.YOUTUBE_DATA_API_KEY || secrets.GOOGLE_API_KEY }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
