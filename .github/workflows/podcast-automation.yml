      YOUTUBE_DESCRIPTION_FOOTER: ${{ secrets.YOUTUBE_DESCRIPTION_FOOTER }}
      YOUTUBE_CUSTOM_THUMBNAIL_ENABLED: ${{ secrets.YOUTUBE_CUSTOM_THUMBNAIL_ENABLED || 'true' }}
      YOUTUBE_DAILY_UPLOAD_LIMIT: ${{ vars.YOUTUBE_DAILY_UPLOAD_LIMIT || secrets.YOUTUBE_DAILY_UPLOAD_LIMIT || '0' }}
      YOUTUBE_THUMBNAIL_UPLOAD_ATTEMPTS: ${{ secrets.YOUTUBE_THUMBNAIL_UPLOAD_ATTEMPTS || '1' }}

